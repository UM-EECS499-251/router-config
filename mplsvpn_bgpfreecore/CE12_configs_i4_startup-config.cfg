!

!
upgrade fpd auto
version 12.4
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname CE12
!
boot-start-marker
boot-end-marker
!
logging message-counter syslog
enable secret 5 $1$.xbQ$91v57RtBV266ZCjgd8ruP0
!
no aaa new-model
ip source-route
no ip icmp rate-limit unreachable
ip cef
!
!
!
!
no ip domain lookup
ip domain name lab.net
no ipv6 cef
!
multilink bundle-name authenticated
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
archive
 log config
  hidekeys
! 
!
!
!
!
ip tcp synwait-time 5
ip ssh source-interface FastEthernet0/0
ip ssh version 2
!
!
!
!
interface Loopback0
 ip address 10.0.0.6 255.255.255.255
!
interface FastEthernet0/0
 ip address 192.168.8.106 255.255.255.0
 duplex half
!
interface GigabitEthernet1/0
 description CE12 to PE1
 ip address 10.1.2.1 255.255.255.254
 negotiation auto
!
interface Ethernet2/0
 description CustB VPC2
 ip address 10.10.1.1 255.255.255.0
 duplex half
!
interface Ethernet2/1
 no ip address
 shutdown
 duplex half
!
interface Ethernet2/2
 no ip address
 shutdown
 duplex half
!
interface Ethernet2/3
 no ip address
 shutdown
 duplex half
!
router ospf 1
 log-adjacency-changes
 network 10.0.0.6 0.0.0.0 area 0
 network 10.10.1.0 0.0.0.255 area 0
!
router bgp 65002
 no synchronization
 bgp router-id 10.0.0.6
 bgp log-neighbor-changes
 redistribute connected
 neighbor 10.1.2.0 remote-as 65000
 no auto-summary
!
ip forward-protocol nd
no ip http server
no ip http secure-server
!
!
!
no cdp log mismatch duplex
!
!
!
!
!
!
control-plane
!
!
!
!
!
!
!
gatekeeper
 shutdown
!
!
line con 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line aux 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line vty 0 4
 login
!
end
