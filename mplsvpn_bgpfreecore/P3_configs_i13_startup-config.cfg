!
!

!
upgrade fpd auto
version 12.4
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname P3
!
boot-start-marker
boot-end-marker
!
logging message-counter syslog
enable secret 5 $1$Jugu$DpEhFZNKDMEXz.al8Xa.s1
!
aaa new-model
!
!
!
!
aaa session-id common
ip source-route
no ip icmp rate-limit unreachable
ip cef
!
!
!
!
no ip domain lookup
ip domain name lab.net
no ipv6 cef
!
multilink bundle-name authenticated
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
username admin privilege 15 secret 5 $1$5j4l$4U8JtvLrCIYpEU8GutNmP.
archive
 log config
  hidekeys
! 
!
!
!
!
ip tcp synwait-time 5
ip ssh source-interface FastEthernet0/0
ip ssh version 2
!
!
!
!
interface Loopback0
 ip address 10.0.0.13 255.255.255.255
!
interface FastEthernet0/0
 ip address 192.168.8.113 255.255.255.0
 duplex half
!
interface GigabitEthernet1/0
 description P3 to PE3
 ip address 10.0.1.16 255.255.255.254
 ip router isis 
 negotiation auto
 mpls ip
!
interface GigabitEthernet2/0
 description P3 to P4
 ip address 10.0.1.5 255.255.255.254
 ip router isis 
 negotiation auto
 mpls ip
!
interface GigabitEthernet3/0
 description P3 to P1
 ip address 10.0.1.9 255.255.255.254
 ip router isis 
 negotiation auto
 mpls ip
!
interface GigabitEthernet4/0
 description P3 to P2
 ip address 10.0.1.11 255.255.255.254
 ip router isis 
 negotiation auto
 mpls ip
!
router isis 
 net 49.0001.0000.0000.0013.00
 is-type level-2-only
 metric-style wide
 passive-interface Loopback0
!
ip forward-protocol nd
no ip http server
no ip http secure-server
!
!
!
no cdp log mismatch duplex
!
!
!
!
!
!
control-plane
!
!
!
!
!
!
!
gatekeeper
 shutdown
!
!
line con 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line aux 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line vty 0 4
 transport input ssh
!
end
