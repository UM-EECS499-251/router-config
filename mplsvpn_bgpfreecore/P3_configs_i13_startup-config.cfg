!
!
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname P3
!
ip cef
no ip domain-lookup
no ip icmp rate-limit unreachable
ip tcp synwait 5
no cdp log mismatch duplex
!
interface Loopback0
 ip address 10.0.0.13 255.255.255.255
 ip router isis
!
interface GigabitEthernet1/0
 description P3 to PE3
 ip address 10.0.1.16 255.255.255.254
 ip router isis
 negotiation auto
 mpls ip
!
interface GigabitEthernet2/0
 description P3 to P4
 ip address 10.0.1.5 255.255.255.254
 ip router isis
 negotiation auto
 mpls ip
!
interface GigabitEthernet3/0
 description P3 to P1
 ip address 10.0.1.9 255.255.255.254
 ip router isis
 negotiation auto
 mpls ip
!
interface GigabitEthernet4/0
 description P3 to P2
 ip address 10.0.1.11 255.255.255.254
 ip router isis
 negotiation auto
 mpls ip
!
router isis 
 net 49.0001.0000.0000.0013.00
 is-type level-2-only
 metric-style wide
 passive-interface Loopback0
!
line con 0
 exec-timeout 0 0
 logging synchronous
 privilege level 15
 no login
line aux 0
 exec-timeout 0 0
 logging synchronous
 privilege level 15
 no login
!
!
end
