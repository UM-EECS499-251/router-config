!

!
upgrade fpd auto
version 12.4
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname P1
!
boot-start-marker
boot-end-marker
!
logging message-counter syslog
enable secret 5 $1$S4fu$ax/I2vKAEGHCsBXmV.9KB0
!
no aaa new-model
ip source-route
no ip icmp rate-limit unreachable
ip cef
!
!
!
!
no ip domain lookup
ip domain name lab.net
no ipv6 cef
!
multilink bundle-name authenticated
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
archive
 log config
  hidekeys
! 
!
!
!
!
ip tcp synwait-time 5
ip ssh source-interface FastEthernet0/0
ip ssh version 2
!
!
!
!
interface Loopback0
 ip address 10.0.0.11 255.255.255.255
!
interface FastEthernet0/0
 ip address 192.168.8.111 255.255.255.0
 duplex half
!
interface GigabitEthernet1/0
 description P1 to PE1
 ip address 10.0.1.12 255.255.255.254
 ip router isis 
 negotiation auto
 mpls ip
!
interface GigabitEthernet2/0
 description P1 to P4
 ip address 10.0.1.1 255.255.255.254
 ip router isis 
 negotiation auto
 mpls ip
!
interface GigabitEthernet3/0
 description P1 to P2
 ip address 10.0.1.6 255.255.255.254
 ip router isis 
 negotiation auto
 mpls ip
!
interface GigabitEthernet4/0
 description P1 to P3
 ip address 10.0.1.8 255.255.255.254
 ip router isis 
 negotiation auto
 mpls ip
!
router isis 
 net 49.0001.0000.0000.0011.00
 is-type level-2-only
 metric-style wide
 passive-interface Loopback0
!
ip forward-protocol nd
no ip http server
no ip http secure-server
!
!
!
no cdp log mismatch duplex
!
!
!
!
!
!
control-plane
!
!
!
!
!
!
!
gatekeeper
 shutdown
!
!
line con 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line aux 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line vty 0 4
 login
!
end
