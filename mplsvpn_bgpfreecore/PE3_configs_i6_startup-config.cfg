!
!

!
upgrade fpd auto
version 12.4
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname PE3
!
boot-start-marker
boot-end-marker
!
vrf definition CustB
 rd 100:2
 route-target export 100:2000
 route-target import 100:2000
 !
 address-family ipv4
 exit-address-family
!
vrf definition CustC
 rd 100:3
 route-target export 100:3000
 route-target import 100:3000
 !
 address-family ipv4
 exit-address-family
!
logging message-counter syslog
!
aaa new-model
ip source-route
no ip icmp rate-limit unreachable
ip cef
!
!
!
!
no ip domain lookup
no ipv6 cef
!
multilink bundle-name authenticated
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
archive
 log config
  hidekeys
! 
!
!
!
!
ip tcp synwait-time 5
!
!
!
!
interface Loopback0
 ip address 10.0.0.3 255.255.255.255
 ip router isis
!
interface Ethernet0/0
 no ip address
 shutdown
 duplex auto
!
interface GigabitEthernet1/0
 description PE3 to CE31
 vrf forwarding CustB
 ip address 10.1.1.2 255.255.255.254
 duplex full
 speed 1000
 media-type gbic
 negotiation auto
!
interface GigabitEthernet2/0
 description PE3 to CE32
 vrf forwarding CustC
 ip address 10.1.1.2 255.255.255.254
 negotiation auto
!
interface GigabitEthernet3/0
 description PE3 to P3
 ip address 10.0.1.17 255.255.255.254
 ip router isis
 negotiation auto
 mpls ip
!
interface GigabitEthernet4/0
 no ip address 
 shutdown
 ip router isis
 negotiation auto
 mpls ip
!
router isis 
 net 49.0001.0000.0000.0003.00
 is-type level-2-only
 metric-style wide
 passive-interface Loopback0
!
router bgp 65000
 bgp log-neighbor-changes  
 neighbor 10.0.0.4 remote-as 65000  
 neighbor 10.0.0.4 update-source Loopback0
!--- Adds an entry to the BGP or MP-BGP neighbor table. 
!--- And enables BGP sessions to use a specific operational interface for TCP connections.  
!
 address-family vpnv4
  neighbor 10.0.0.4 activate
  neighbor 10.0.0.4 send-community both
 exit-address-family
!--- To enter address family configuration mode that use standard VPN version 4 address prefixes.
!--- Creates the VPNv4 neighbor session to the Route Reflector. 
!--- And to send the community attribute to the BGP neighbor. 
!
 address-family ipv4 vrf CustB
  neighbor 10.1.1.3 remote-as 65005
  neighbor 10.1.1.3 activate
 exit-address-family
 !
 address-family ipv4 vrf CustC
  neighbor 10.1.1.3 remote-as 65006
  neighbor 10.1.1.3 activate
 exit-address-family
!--- These are the eBGP sessions to each CE router belonging to different customers.
!--- The eBGP sessions are configured within the VRF address family
!
ip forward-protocol nd
no ip http server
no ip http secure-server
!
!
!
no cdp log mismatch duplex
!
!
!
!
!
!
control-plane
!
!
!
!
!
!
!
gatekeeper
 shutdown
!
!
line con 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line aux 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line vty 0 4
 login
!
end
