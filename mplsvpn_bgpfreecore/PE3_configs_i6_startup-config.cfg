!

!
upgrade fpd auto
version 12.4
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname PE3
!
boot-start-marker
boot-end-marker
!
vrf definition CustA
 rd 100:1
 route-target export 100:1000
 route-target import 100:1000
 route-target import 100:2000
 !
 address-family ipv4
 exit-address-family
!
vrf definition CustB
 rd 100:2
 route-target export 100:2000
 route-target import 100:2000
 route-target import 100:1000
 !
 address-family ipv4
 exit-address-family
!
vrf definition CustC
 rd 100:3
 route-target export 100:3000
 route-target import 100:3000
 !
 address-family ipv4
 exit-address-family
!
logging message-counter syslog
enable secret 5 $1$rfPO$re6Zdr2b0MVhU8bYUYZbm1
!
aaa new-model
!
!
!
!
aaa session-id common
ip source-route
no ip icmp rate-limit unreachable
ip cef
!
!
!
!
no ip domain lookup
ip domain name lab.net
no ipv6 cef
!
multilink bundle-name authenticated
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
archive
 log config
  hidekeys
! 
!
!
!
!
ip tcp synwait-time 5
ip ssh source-interface FastEthernet0/0
ip ssh version 2
!
!
!
!
interface Loopback0
 ip address 10.0.0.3 255.255.255.255
!
interface FastEthernet0/0
 ip address 192.168.8.102 255.255.255.0
 duplex half
!
interface GigabitEthernet1/0
 description PE3 to CE31
 vrf forwarding CustB
 ip address 10.1.2.2 255.255.255.254
 negotiation auto
!
interface GigabitEthernet2/0
 description PE3 to CE32
 vrf forwarding CustC
 ip address 10.1.3.2 255.255.255.254
 negotiation auto
!
interface GigabitEthernet3/0
 description PE3 to P3
 ip address 10.0.1.17 255.255.255.254
 ip router isis 
 negotiation auto
 mpls ip
!
router isis 
 net 49.0001.0000.0000.0003.00
 is-type level-2-only
 metric-style wide
 passive-interface Loopback0
!
router bgp 65000
 no synchronization
 bgp log-neighbor-changes
 neighbor 10.0.0.4 remote-as 65000
 neighbor 10.0.0.4 update-source Loopback0
 no auto-summary
 !
 address-family vpnv4
  neighbor 10.0.0.4 activate
  neighbor 10.0.0.4 send-community both
 exit-address-family
 !
 address-family ipv4 vrf CustC
  neighbor 10.1.3.3 remote-as 65006
  neighbor 10.1.3.3 activate
  no synchronization
 exit-address-family
 !
 address-family ipv4 vrf CustB
  neighbor 10.1.2.3 remote-as 65005
  neighbor 10.1.2.3 activate
  no synchronization
 exit-address-family
 !
 address-family ipv4 vrf CustA
  no synchronization
 exit-address-family
!
ip forward-protocol nd
no ip http server
no ip http secure-server
!
!
!
no cdp log mismatch duplex
!
!
!
!
!
!
control-plane
!
!
!
!
!
!
!
gatekeeper
 shutdown
!
!
line con 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line aux 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line vty 0 4
!
end
