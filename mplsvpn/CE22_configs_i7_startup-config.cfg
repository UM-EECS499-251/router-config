!
!
!
!
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname CE31
!
ip cef
no ip domain-lookup
no ip icmp rate-limit unreachable
ip tcp synwait 5
no cdp log mismatch duplex
!
interface Loopback0
 ip address 10.0.0.8 255.255.255.255
!
interface GigabitEthernet0/0
 description CE22 to PE2
 ip address 10.1.1.1 255.255.255.254
 duplex full
 speed 1000
 media-type gbic
 negotiation auto
!
interface GigabitEthernet1/0
 no ip address
 negotiation auto
!
interface Ethernet2/0
 description CustC VPC4
 ip address 10.10.1.1 255.255.255.0
 negotiation auto
 no shut
!
router ospf 1
 network 10.0.0.8 255.255.255.255 area 0
 network 10.10.1.0 0.0.0.255 area 0
 redistribute bgp subnets
!
router bgp 65004
 bgp router-id 10.0.0.8
 bgp log-neighbor-changes
 redistribute connected
 redistribute ospf
 neighbor 10.1.1.0 remote-as 65000
!
line con 0
 exec-timeout 0 0
 logging synchronous
 privilege level 15
 no login
line aux 0
 exec-timeout 0 0
 logging synchronous
 privilege level 15
 no login
!
!
end
