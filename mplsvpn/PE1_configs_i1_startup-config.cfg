!

!
upgrade fpd auto
version 12.4
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname PE1
!
boot-start-marker
boot-end-marker
!
vrf definition CustA
 rd 100:1
 route-target export 100:1000
 route-target import 100:1000
 !
 address-family ipv4
!  import map CustB_Import
 exit-address-family
!
vrf definition CustB
 rd 100:2
 route-target export 100:2000
 route-target import 100:2000
 !
 address-family ipv4
!  import map CustA_Import
 exit-address-family
!
ip prefix-list IPv4_Filter_CustA description ** Filter-list CustA **
ip prefix-list IPv4_Filter_CustA seq 5 permit 10.5.1.0/24
ip prefix-list IPv4_Filter_CustA seq 10 permit 10.5.2.0/24
ip prefix-list IPv4_Filter_CustA seq 15 permit 10.0.0.5/32
ip prefix-list IPv4_Filter_CustA seq 20 permit 10.0.0.7/32
!
ip prefix-list IPv4_Filter_CustB description ** Filter-list CustB **
ip prefix-list IPv4_Filter_CustB seq 5 permit 10.10.1.0/23
ip prefix-list IPv4_Filter_CustB seq 10 permit 10.10.2.0/24
ip prefix-list IPv4_Filter_CustB seq 15 permit 10.0.0.6/32
ip prefix-list IPv4_Filter_CustB seq 20 permit 10.0.0.9/32
!
route-map CustA_Import permit 10
 description ** Import CustA **
 match ip address prefix-list IPv4_Filter_CustA
 set extcommunity rt 100:2000 additive
!
route-map CustB_Import permit 10
 description ** Import CustB **
 match ip address prefix-list IPv4_Filter_CustB
 set extcommunity rt 100:1000 additive
!
logging message-counter syslog
!
aaa new-model
!
!
!
!
aaa session-id common
ip source-route
no ip icmp rate-limit unreachable
ip cef
!
!
!
!
no ip domain lookup
no ipv6 cef
!
multilink bundle-name authenticated
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
archive
 log config
  hidekeys
! 
!
!
!
!
ip tcp synwait-time 5
!
!
!
!
interface Loopback0
 ip address 10.0.0.1 255.255.255.255
 ip router isis 
!
interface Ethernet0/0
 no ip address
 shutdown
 duplex auto
!
interface GigabitEthernet0/0
 description PE1 to CE11
 vrf forwarding CustA
 ip address 10.1.1.0 255.255.255.254
 duplex full
 speed 1000
 media-type gbic
 negotiation auto
!
interface GigabitEthernet1/0
 description PE1 to CE12
 vrf forwarding CustB
 ip address 10.1.1.0 255.255.255.254
 negotiation auto
!--- Associates a VRF instance with an interface or subinterface. 
!--- GigabitEthernet0/1 and 0/2 use the same IP address, 10.0.4.2. 
!--- This is allowed because they belong to two different customer VRFs. 
!
interface GigabitEthernet2/0
 description PE1 to P
 ip address 10.0.1.1 255.255.255.254
 ip router isis 
! ip ospf network point-to-point
 negotiation auto
 mpls ip
!
interface GigabitEthernet3/0
 description PE1 to PE2
 ip address 10.0.1.6 255.255.255.254
 ip router isis 
 negotiation auto
 mpls ip
!
interface GigabitEthernet4/0
 description PE1 to PE3
 ip address 10.0.1.8 255.255.255.254
 ip router isis 
 negotiation auto
 mpls ip
!--- Enables MPLS on the L3 interface connecting to the P router
!
router isis 
 net 49.0001.0000.0000.0001.00
 is-type level-2-only
 metric-style wide
 passive-interface Loopback0
!
router bgp 65000
 bgp log-neighbor-changes  
 neighbor 10.0.0.4 remote-as 65000  
 neighbor 10.0.0.4 update-source Loopback0
!--- Adds an entry to the BGP or MP-BGP neighbor table. 
!--- And enables BGP sessions to use a specific operational interface for TCP connections.  
!
 address-family vpnv4
  neighbor 10.0.0.4 activate
  neighbor 10.0.0.4 send-community both
 exit-address-family
!--- To enter address family configuration mode that use standard VPN version 4 address prefixes.
!--- Creates the VPNv4 neighbor session to the Route Reflector. 
!--- And to send the community attribute to the BGP neighbor. 
!
 address-family ipv4 vrf CustA
  neighbor 10.1.1.1 remote-as 65001
  neighbor 10.1.1.1 activate
 exit-address-family
 !
 address-family ipv4 vrf CustB
  neighbor 10.1.1.1 remote-as 65002
  neighbor 10.1.1.1 activate
 exit-address-family
!--- These are the eBGP sessions to each CE router belonging to different customers.
!--- The eBGP sessions are configured within the VRF address family
!
ip forward-protocol nd
no ip http server
no ip http secure-server
!
!
!
no cdp log mismatch duplex
!
!
!
!
!
!
control-plane
!
!
!
!
!
!
!
gatekeeper
 shutdown
!
!
line con 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line aux 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line vty 0 4
!
end
