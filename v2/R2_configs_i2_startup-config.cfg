!

!
upgrade fpd auto
version 12.4
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname R2
!
boot-start-marker
boot-end-marker
!
logging message-counter syslog
enable password admin
!
aaa new-model
!
!
!
!
aaa session-id common
ip source-route
no ip icmp rate-limit unreachable
ip cef
!
!
!
!
no ip domain lookup
ip domain name lab.net
no ipv6 cef
!
multilink bundle-name authenticated
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
username admin password 0 admin
archive
 log config
  hidekeys
! 
!
!
!
!
ip tcp synwait-time 5
ip ssh version 2
!
!
!
!
interface Loopback0
 ip address 10.0.0.2 255.255.255.255
 ip router isis 
!
interface FastEthernet0/0
 ip address 192.168.8.52 255.255.255.0
 ip access-group 101 in
 duplex half
!
interface Ethernet1/0
 ip address 10.1.1.2 255.255.255.252
 duplex half
!
interface Ethernet1/1
 ip address 10.1.1.9 255.255.255.252
 ip router isis 
 duplex half
!
interface Ethernet1/2
 no ip address
 shutdown
 duplex half
!
interface Ethernet1/3
 no ip address
 shutdown
 duplex half
!
interface Ethernet1/4
 no ip address
 shutdown
 duplex half
!
interface Ethernet1/5
 no ip address
 shutdown
 duplex half
!
interface Ethernet1/6
 no ip address
 shutdown
 duplex half
!
interface Ethernet1/7
 no ip address
 shutdown
 duplex half
!
router isis 
 net 49.0001.0000.0000.0002.00
 is-type level-2-only
 redistribute connected
 redistribute static ip
 redistribute bgp 200 route-map RM-BGP-ISIS
!
router bgp 200
 no synchronization
 bgp router-id 10.0.0.2
 bgp log-neighbor-changes
 network 10.0.0.2 mask 255.255.255.255
 redistribute connected
 redistribute isis level-1-2
 neighbor 10.0.0.1 remote-as 100
 neighbor 10.0.0.1 ebgp-multihop 2
 neighbor 10.0.0.1 update-source Loopback0
 no auto-summary
!
ip forward-protocol nd
ip route 10.0.0.1 255.255.255.255 10.1.1.1 permanent
no ip http server
no ip http secure-server
!
!
!
!
ip prefix-list BGP-TO-ISIS seq 5 permit 10.10.10.0/24
access-list 101 permit tcp 192.168.8.0 0.0.0.255 any eq 22
no cdp log mismatch duplex
!
!
!
!
route-map RM-BGP-ISIS permit 10
 match ip address prefix-list BGP-TO-ISIS
 set metric 50
 set metric-type external
!
!
!
control-plane
!
!
!
!
!
!
!
gatekeeper
 shutdown
!
!
line con 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line aux 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line vty 0 4
 transport input ssh
!
end
