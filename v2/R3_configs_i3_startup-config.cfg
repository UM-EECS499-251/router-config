!
upgrade fpd auto
version 12.4
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname R3
!
boot-start-marker
boot-end-marker
!
logging message-counter syslog
enable secret 5 $1$NUWu$z7RCOIShFQyXIVdYXpZIK0
!
aaa new-model
!
aaa session-id common
ip source-route
no ip icmp rate-limit unreachable
ip cef
!
no ip domain lookup
ip domain name lab.net
no ipv6 cef
!
multilink bundle-name authenticated
!
username admin secret 5 $1$WSv8$p13B14moiARHZVpwcB7pV1
archive
 log config
  hidekeys
! 
ip tcp synwait-time 5
ip ssh version 2
!
! Define the authorized source network
access-list 101 permit tcp 192.168.8.0 0.0.0.255 any eq 22
! Optional: explicitly deny other SSH traffic if needed, 
! but usually the implicit deny all at the end works.
!
interface Loopback0
 ip address 10.0.0.3 255.255.255.255
!
interface FastEthernet0/0
 ip address 192.168.8.53 255.255.255.0
 ip access-group 101 in
!
interface FastEthernet0/1
 no ip address
 shutdown
!
interface Ethernet1/0
 no ip address
 shutdown
!
interface Ethernet1/1
 ip address 10.1.1.6 255.255.255.252
!
interface Ethernet1/2
 no ip address
 shutdown
 duplex half
!
interface Ethernet1/3
 no ip address
 shutdown
 duplex half
!
interface Ethernet1/4
 no ip address
 shutdown
 duplex half
!
interface Ethernet1/5
 no ip address
 shutdown
 duplex half
!
interface Ethernet1/6
 no ip address
 shutdown
 duplex half
!
interface Ethernet1/7
 ip address 10.10.10.1 255.255.255.0
!
router ospf 1
 log-adjacency-changes
 network 10.0.0.3 0.0.0.0 area 0
 network 10.1.1.4 0.0.0.3 area 0
 network 10.10.10.0 0.0.0.255 area 1
 redistribute bgp 100 subnets
! redistribute connected subnets
!
router bgp 100
 bgp router-id 10.0.0.3
 no synchronization
 bgp log-neighbor-changes
 network 10.0.0.3 mask 255.255.255.255
 neighbor 10.0.0.1 remote-as 100
 neighbor 10.0.0.1 update-source loopback 0
 redistribute ospf 1
! redistribute connected
 no auto-summary
!
ip forward-protocol nd
no ip http server
no ip http secure-server
!
no cdp log mismatch duplex
!
control-plane
!
gatekeeper
 shutdown
!
line con 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line aux 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line vty 0 4
 transport input ssh
!
end
