!

!
upgrade fpd auto
version 12.4
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname CE11
!
boot-start-marker
boot-end-marker
!
logging message-counter syslog
enable secret 5 $1$QRJT$UO.LaN1/Ob68FlZGdsAVk/
!
aaa new-model
!
!
!
!
aaa session-id common
ip source-route
no ip icmp rate-limit unreachable
ip cef
!
!
!
!
no ip domain lookup
ip domain name lab.net
no ipv6 cef
!
multilink bundle-name authenticated
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
username admin privilege 15 secret 5 $1$cyv9$m2g5Gl9n34W5B6NWDcSWz1
archive
 log config
  hidekeys
! 
!
!
!
!
ip tcp synwait-time 5
ip ssh source-interface FastEthernet0/0
ip ssh version 2
!
!
!
!
interface Loopback0
 ip address 10.0.0.8 255.255.255.255
!
interface FastEthernet0/0
 ip address 192.168.8.108 255.255.255.0
 duplex half
!
interface GigabitEthernet1/0
 description CE11 to PE1
 ip address 10.1.1.1 255.255.255.254
 negotiation auto
!
interface GigabitEthernet2/0
 description CustA VPC1
 ip address 10.5.1.1 255.255.255.0
 negotiation auto
!
router ospf 1
 log-adjacency-changes
 network 10.0.0.5 0.0.0.0 area 0
 network 10.5.1.0 0.0.0.255 area 0
!
router bgp 65001
 no synchronization
 bgp router-id 10.0.0.5
 bgp log-neighbor-changes
 redistribute connected
 neighbor 10.1.1.0 remote-as 65000
 no auto-summary
!
ip forward-protocol nd
no ip http server
no ip http secure-server
!
!
!
no cdp log mismatch duplex
!
!
!
!
!
!
control-plane
!
!
!
!
!
!
!
gatekeeper
 shutdown
!
!
line con 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line aux 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line vty 0 4
 transport input ssh
!
end
