!
!

!
version 12.4
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname CE13
!
boot-start-marker
boot-end-marker
!
!
no aaa new-model
memory-size iomem 5
no ip icmp rate-limit unreachable
!
!
ip cef
no ip domain lookup
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
ip tcp synwait-time 5
!
!
!
interface Loopback0
 ip address 10.0.0.14 255.255.255.255
!
interface FastEthernet0/0
 ip address 192.168.8.14 255.255.255.0
!
interface GigabitEthernet1/0
 ip address 10.1.3.5 255.255.255.254
!
interface GigabitEthernet2/0
 ip address 10.10.3.1 255.255.255.0
!
router ospf 1
 log-adjacency-changes
 redistribute bgp 65007 subnets
 network 10.0.0.14 0.0.0.0 area 0
 network 10.10.3.0 0.0.0.255 area 0
!
router bgp 65007
 no synchronization
 bgp router-id 10.0.0.14
 bgp log-neighbor-changes
 redistribute connected
 redistribute ospf 1
 neighbor 10.1.3.4 remote-as 65000
 no auto-summary
!
no ip http server
ip forward-protocol nd
!
!
!
no cdp log mismatch duplex
!
!
!
control-plane
!
!
!
!
!
!
!
!
!
gatekeeper
 shutdown
!
!
line con 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
line aux 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
line vty 0 4
 login
!
!
end
