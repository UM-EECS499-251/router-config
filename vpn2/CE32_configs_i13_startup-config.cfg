!
!
!

!
upgrade fpd auto
version 12.4
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname CE32
!
boot-start-marker
boot-end-marker
!
logging message-counter syslog
enable secret 5 $1$hSXx$oDZ8Q4jlfyulAD00zZb/H0
!
aaa new-model
!
!
!
!
aaa session-id common
ip source-route
no ip icmp rate-limit unreachable
ip cef
!
!
!
!
no ip domain lookup
ip domain name lab.net
no ipv6 cef
!
multilink bundle-name authenticated
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
username admin privilege 15 secret 5 $1$.Oau$8eZGe4xjKS8TM7GdwVwiY.
archive
 log config
  hidekeys
! 
!
!
!
!
ip tcp synwait-time 5
ip ssh source-interface FastEthernet0/0
ip ssh version 2
!
!
!
!
interface Loopback0
 ip address 10.0.0.13 255.255.255.255
!
interface FastEthernet0/0
 ip address 192.168.8.113 255.255.255.0
 duplex half
!
interface GigabitEthernet1/0
 description CE32 to PE3
 ip address 10.1.3.3 255.255.255.254
 negotiation auto
!
interface GigabitEthernet2/0
 description CustC VPC6
 ip address 10.10.2.1 255.255.255.0
 negotiation auto
!
router ospf 1
 log-adjacency-changes
 network 10.0.0.10 0.0.0.0 area 0
 network 10.10.2.0 0.0.0.255 area 0
!
router bgp 65006
 no synchronization
 bgp router-id 10.0.0.10
 bgp log-neighbor-changes
 redistribute connected
 neighbor 10.1.3.2 remote-as 65000
 no auto-summary
!
ip forward-protocol nd
no ip http server
no ip http secure-server
!
!
!
no cdp log mismatch duplex
!
!
!
!
!
!
control-plane
!
!
!
!
!
!
!
gatekeeper
 shutdown
!
!
line con 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line aux 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line vty 0 4
 transport input ssh
!
end
