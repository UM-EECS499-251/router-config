!
!
!
!

!
upgrade fpd auto
version 12.4
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname PE2
!
boot-start-marker
boot-end-marker
!
vrf definition CustA
 rd 100:1
 route-target export 100:1000
 route-target import 100:1000
 route-target import 100:2000
 !
 address-family ipv4
 exit-address-family
!
vrf definition CustC
 rd 100:3
 route-target export 100:3000
 route-target import 100:3000
 !
 address-family ipv4
 exit-address-family
!
logging message-counter syslog
enable secret 5 $1$7xIA$wUV2HKV/lMlIbjPx5EyNV/
!
aaa new-model
!
!
!
!
aaa session-id common
ip source-route
no ip icmp rate-limit unreachable
ip cef
!
!
!
!
no ip domain lookup
ip domain name lab.net
no ipv6 cef
!
multilink bundle-name authenticated
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
username admin privilege 15 secret 5 $1$oO/p$bIPxQ8LAe/L.TgN0H/8aA/
archive
 log config
  hidekeys
! 
!
!
!
!
ip tcp synwait-time 5
ip ssh source-interface FastEthernet0/0
ip ssh version 2
!
!
!
!
interface Loopback0
 ip address 10.0.0.2 255.255.255.255
!
interface FastEthernet0/0
 ip address 192.168.8.102 255.255.255.0
 duplex half
!
interface GigabitEthernet1/0
 description PE2 to CE21
 vrf forwarding CustA
 ip address 10.1.1.2 255.255.255.254
 negotiation auto
!
interface GigabitEthernet2/0
 description PE2 to CE22
 vrf forwarding CustC
 ip address 10.1.3.0 255.255.255.254
 negotiation auto
!
interface GigabitEthernet3/0
 description PE2 to P2
 ip address 10.0.1.15 255.255.255.254
 ip router isis 
 negotiation auto
 mpls ip
!
router isis 
 net 49.0001.0000.0000.0002.00
 is-type level-2-only
 metric-style wide
 passive-interface Loopback0
!
router bgp 65000
 no synchronization
 bgp log-neighbor-changes
 neighbor 10.0.0.4 remote-as 65000
 neighbor 10.0.0.4 update-source Loopback0
 no auto-summary
 !
 address-family vpnv4
  neighbor 10.0.0.4 activate
  neighbor 10.0.0.4 send-community both
 exit-address-family
 !
 address-family ipv4 vrf CustC
  neighbor 10.1.3.1 remote-as 65004
  neighbor 10.1.3.1 activate
  no synchronization
 exit-address-family
 !
 address-family ipv4 vrf CustA
  neighbor 10.1.1.3 remote-as 65003
  neighbor 10.1.1.3 activate
  no synchronization
 exit-address-family
!
ip forward-protocol nd
no ip http server
no ip http secure-server
!
!
!
no cdp log mismatch duplex
!
!
!
!
!
!
control-plane
!
!
!
!
!
!
!
gatekeeper
 shutdown
!
!
line con 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line aux 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line vty 0 4
 transport input ssh
!
end
